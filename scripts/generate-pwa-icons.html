<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWA Icon Generator</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #1e3a8a;
        margin-bottom: 20px;
      }
      .controls {
        margin: 20px 0;
      }
      input[type='file'] {
        margin: 10px 0;
      }
      button {
        background: #1e3a8a;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin: 5px;
      }
      button:hover {
        background: #2563eb;
      }
      .preview {
        margin: 20px 0;
      }
      canvas {
        border: 2px solid #ddd;
        margin: 10px;
      }
      .info {
        background: #eff6ff;
        border-left: 4px solid #1e3a8a;
        padding: 15px;
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎨 PWA Icon Generator</h1>

      <div class="info">
        <strong>Instruksi:</strong>
        <ol>
          <li>Upload logo/icon perusahaan (PNG/JPG)</li>
          <li>
            Icon akan di-generate dalam 4 ukuran: 192x192, 512x512, dan versi
            maskable
          </li>
          <li>Klik tombol download untuk setiap icon</li>
          <li>Simpan di folder <code>/public/images/</code></li>
        </ol>
      </div>

      <div class="controls">
        <label><strong>Upload Logo:</strong></label
        ><br />
        <input type="file" id="logoInput" accept="image/*" />
      </div>

      <div id="preview" class="preview"></div>
    </div>

    <script>
      const logoInput = document.getElementById('logoInput')
      const preview = document.getElementById('preview')

      logoInput.addEventListener('change', (e) => {
        const file = e.target.files[0]
        if (!file) return

        const reader = new FileReader()
        reader.onload = (event) => {
          const img = new Image()
          img.onload = () => {
            generateIcons(img)
          }
          img.src = event.target.result
        }
        reader.readAsDataURL(file)
      })

      function generateIcons(img) {
        preview.innerHTML = '<h3>Generated Icons:</h3>'

        // Icon sizes
        const sizes = [
          { size: 192, name: 'icon-192.png', maskable: false },
          { size: 512, name: 'icon-512.png', maskable: false },
          { size: 192, name: 'icon-192-maskable.png', maskable: true },
          { size: 512, name: 'icon-512-maskable.png', maskable: true },
        ]

        sizes.forEach(({ size, name, maskable }) => {
          const canvas = document.createElement('canvas')
          canvas.width = size
          canvas.height = size
          const ctx = canvas.getContext('2d')

          // Background
          ctx.fillStyle = '#1e3a8a' // Theme color
          ctx.fillRect(0, 0, size, size)

          // Calculate image dimensions
          const padding = maskable ? size * 0.2 : size * 0.1 // Maskable needs more padding
          const imageSize = size - padding * 2

          // Draw image centered
          const aspectRatio = img.width / img.height
          let drawWidth = imageSize
          let drawHeight = imageSize

          if (aspectRatio > 1) {
            drawHeight = imageSize / aspectRatio
          } else {
            drawWidth = imageSize * aspectRatio
          }

          const x = (size - drawWidth) / 2
          const y = (size - drawHeight) / 2

          ctx.drawImage(img, x, y, drawWidth, drawHeight)

          // Add to preview
          const container = document.createElement('div')
          container.innerHTML = `
          <div style="display: inline-block; margin: 10px; text-align: center;">
            <p><strong>${name}</strong> ${maskable ? '(Maskable)' : ''}</p>
            ${canvas.outerHTML}
            <br>
            <button onclick="downloadCanvas(this, '${name}')">Download ${size}x${size}</button>
          </div>
        `
          preview.appendChild(container)
        })
      }

      function downloadCanvas(btn, filename) {
        const canvas = btn.parentElement.querySelector('canvas')
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob)
          const a = document.createElement('a')
          a.href = url
          a.download = filename
          a.click()
          URL.revokeObjectURL(url)
        })
      }
    </script>
  </body>
</html>
